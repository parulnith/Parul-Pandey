{{ define "main" }}

<style>
  .hackathon-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
    margin-top: 32px;
  }

  @media (max-width: 680px) {
    .hackathon-grid {
      grid-template-columns: 1fr;
    }
  }

  .hackathon-card {
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    background: var(--entry);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
  }

  .hackathon-card:hover {
    border-color: #cbd5e1;
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    transform: translateY(-2px);
  }

  .hackathon-body {
    padding: 18px 20px 20px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .hackathon-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .hackathon-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
  }

  .hackathon-badge:empty {
    display: none;
  }

  .badge-gold   { background: #fef3c7; color: #92400e; }
  .badge-purple { background: #ede9fe; color: #5b21b6; }
  .badge-blue   { background: #dbeafe; color: #1e40af; }

  .hackathon-event {
    font-size: 12px;
    color: #94a3b8;
  }

  .hackathon-title {
    font-size: 17px;
    font-weight: 700;
    margin: 0 0 10px 0;
    color: #0f172a;
    line-height: 1.3;
  }

  .hackathon-desc {
    font-size: 14px;
    color: #475569;
    line-height: 1.65;
    margin: 0 0 20px 0;
    flex: 1;
  }

  .hackathon-link {
    align-self: flex-start;
    font-size: 13px;
    font-weight: 600;
    color: #1e293b;
    text-decoration: none;
    border: 1.5px solid #e2e8f0;
    padding: 7px 16px;
    border-radius: 7px;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .hackathon-link:hover {
    background: #f8fafc;
    border-color: #cbd5e1;
  }

  .hackathon-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .page-intro {
    color: #64748b;
    font-size: 15px;
    margin-top: 8px;
  }
</style>

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="page-intro">Projects I built for competitions — with outcomes and links to the work.</p>
  </header>

  <div class="post-content">
    <div class="hackathon-grid">
      {{- range .Params.hackathons }}
      <div class="hackathon-card">

        <div class="hackathon-body">
          <div class="hackathon-meta">
            <span class="hackathon-badge badge-{{ .award_color }}">{{ .award }}</span>
            <span class="hackathon-event">{{ .event }}</span>
          </div>
          <h2 class="hackathon-title">{{ .title }}</h2>
          <p class="hackathon-desc">{{ .description }}</p>
          <div class="hackathon-links">
            <a href="{{ .link }}" target="_blank" rel="noopener noreferrer" class="hackathon-link">
              {{ .link_text }} →
            </a>
            {{- if .youtube }}
            <a href="{{ .youtube }}" target="_blank" rel="noopener noreferrer" class="hackathon-link">
              ▶ Watch Demo
            </a>
            {{- end }}
          </div>
        </div>

      </div>
      {{- end }}
    </div>
  </div>
</article>

{{ end }}
