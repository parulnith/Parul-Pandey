{{ define "main" }}

<style>
  .hackathon-list {
    margin-top: 28px;
    border-top: 1px solid var(--border);
  }

  .hackathon-item {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 18px;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
  }

  @media (max-width: 680px) {
    .hackathon-item {
      grid-template-columns: 1fr;
      gap: 12px;
    }
  }

  .hackathon-main {
    min-width: 0;
  }

  .hackathon-title-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .hackathon-title {
    font-size: 16px;
    font-weight: 650;
    line-height: 1.35;
    margin: 0;
    color: var(--primary);
  }

  .hackathon-badge {
    font-size: 11px;
    font-weight: 650;
    color: #2563eb;
    white-space: nowrap;
  }

  .hackathon-event {
    display: block;
    font-size: 13px;
    color: var(--secondary);
  }

  .hackathon-links {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }

  @media (max-width: 680px) {
    .hackathon-links {
      justify-content: flex-start;
    }
  }

  .hackathon-link {
    font-size: 13px;
    font-weight: 600;
    color: #2563eb;
    text-decoration: none;
  }

  .hackathon-link:hover {
    text-decoration: underline;
  }

  .page-intro {
    color: #64748b;
    font-size: 15px;
    margin-top: 8px;
  }
</style>

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
    <p class="page-intro">Projects I built for competitions — with outcomes and links to the work.</p>
  </header>

  <div class="post-content">
    <div class="hackathon-list">
      {{- range .Params.hackathons }}
      <section class="hackathon-item">
        <div class="hackathon-main">
          <div class="hackathon-title-row">
            <h2 class="hackathon-title">{{ .title }}</h2>
            {{- with .award }}
            <span class="hackathon-badge">{{ . }}</span>
            {{- end }}
          </div>
          <span class="hackathon-event">{{ .event }}</span>
        </div>
        <div class="hackathon-links">
          <a href="{{ .link }}" target="_blank" rel="noopener noreferrer" class="hackathon-link">
            {{ .link_text }} →
          </a>
          {{- if .youtube }}
          <a href="{{ .youtube }}" target="_blank" rel="noopener noreferrer" class="hackathon-link">
            Demo →
          </a>
          {{- end }}
        </div>
      </section>
      {{- end }}
    </div>
  </div>
</article>

{{ end }}
