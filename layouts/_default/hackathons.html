{{ define "main" }}

<style>
  .hackathon-wrap {
    max-width: 860px;
  }

  .hackathon-table {
    margin-top: 0;
  }

  .hackathon-project {
    font-weight: 500;
  }

  .hackathon-award {
    color: #2563eb;
    font-size: 0.9em;
    white-space: nowrap;
  }

  .hackathon-links {
    white-space: nowrap;
  }

  .hackathon-links a {
    margin-right: 10px;
  }

  .hackathon-links a:last-child {
    margin-right: 0;
  }

  @media (max-width: 680px) {
    .hackathon-table {
      font-size: 14px;
    }
  }
</style>

<article class="post-single hackathon-wrap">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    <table class="hackathon-table">
      <thead>
        <tr>
          <th>Project</th>
          <th>Event</th>
          <th>Year</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody>
      {{- range .Params.hackathons }}
        <tr>
          <td>
            <span class="hackathon-project">{{ .title }}</span>
            {{- with .award }}
            <br><span class="hackathon-award">{{ . }}</span>
            {{- end }}
          </td>
          <td>{{ .event }}</td>
          <td>{{ .year }}</td>
          <td class="hackathon-links">
            <a href="{{ .link }}" target="_blank" rel="noopener noreferrer">{{ .link_text }}</a>
            {{- if .youtube }}
            <a href="{{ .youtube }}" target="_blank" rel="noopener noreferrer">Demo</a>
            {{- end }}
          </td>
        </tr>
      {{- end }}
      </tbody>
    </table>
  </div>
</article>

{{ end }}
