[params]
  title = "Parul Pandey"
  description = "Parul Pandey works at the intersection of AI education, developer relations, and data science, creating technical writing, courses, workshops, and hands-on AI and ML projects."
  author = "Parul Pandey"
  keywords = [
    "Parul Pandey",
    "AI education",
    "developer relations",
    "data science",
    "machine learning",
    "large language models",
    "LLMs",
    "technical writing",
    "Kaggle Grandmaster",
